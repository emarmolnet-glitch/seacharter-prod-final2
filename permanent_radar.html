<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8"> 
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * wss: https:; img-src * data: blob:; style-src * 'unsafe-inline';">
<title>SeaCharter Core PRO - Permanent Radar</title> 
<script>
window.process = window.process || { env: {} };
window.global = window.global || window;
window.createHash = window.createHash || function () {
    let value = '';
    return {
        update(input) { value += String(input || ''); return this; },
        digest() { return value ? String(value.length) : '0'; }
    };
};
</script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6"> 

<div class="max-w-4xl mx-auto"> 
<h1 class="text-2xl font-bold mb-4">Charging Radar - Active in the background</h1> 
<div id="radar-list" class="grid gap-4"> 
</div> 
</div> 

<script> 
// --- 1. GLOBAL SHIP WAREHOUSE --- 
let vesselStore = {}; 
const CARGO_SHIP_TYPES = [70, 71, 72, 73, 74, 75, 76, 77, 78, 79, 80, 81, 82, 83, 84, 85, 86, 87, 88, 89]; 
let radarWsActive = false;
let radarFallbackTimer = null;
const AIS_FALLBACK_RETRY_INTERVAL = 60000;
const AIS_FALLBACK_COOLDOWN_INTERVAL = 300000;
const AIS_PROXY_ENDPOINT = "/.netlify/functions/get-vessels?mode=global&quantity=1000";
let radarFallbackProcessing = false;

// --- 2. AUTO START --- 
document.addEventListener('DOMContentLoaded', () => { 
startAutomaticRadar(); 
}); 

function startAutomaticRadar() { 
console.log("Intentando conectar con AISStream...");
const apiKey = getRadarAisApiKey();
if (!apiKey || apiKey === 'undefined' || /^\*+$/.test(apiKey)) {
    console.warn("[AISStream] API key no disponible en navegador. Usando proxy server-side.");
    iniciarFallbackRadar();
    return;
}
if (typeof WebSocket === 'undefined') {
    console.warn("WebSocket is not supported in this environment.");
    iniciarFallbackRadar();
    return;
}

try {
    const ws = new WebSocket("wss://stream.aisstream.io/v0/stream"); 

    ws.onopen = () => {
        console.log("Conexión abierta. Enviando suscripción universal...");
        console.log("[AISStream] API key validada antes de suscripción:", { present: true, maskedLiteral: false });
        const OPERATIONAL_ZONES = {
            MEDITERRANEAN: [[-10.0, 30.0], [36.0, 46.0]],
            CARIBBEAN_HONDURAS: [[-90.0, 8.0], [-60.0, 25.0]]
        };
        const subscription = {
            "APIKey": apiKey, 
            "BoundingBoxes": [OPERATIONAL_ZONES.MEDITERRANEAN],
            "VesselTypes": [],
            "FilterMessageTypes": ["PositionReport", "ShipStaticData"]
        };
        ws.send(JSON.stringify(subscription));
    };

    ws.onmessage = async (event) => {
        radarWsActive = true;
        detenerFallbackRadar();
        try {
            // Correction of the Blob error: We convert to text before parsing
            const text = event.data instanceof Blob ? await event.data.text() : event.data;
            const message = JSON.parse(text);
            procesarMensajeDeRadar(message);
        } catch (e) {
            // Silence minor parsing errors
        }
    };

    ws.onerror = (error) => {
        console.error("ERROR CRÍTICO DE WEBSOCKET:", error);
        radarWsActive = false;
        iniciarFallbackRadar();
    };

    ws.onclose = (event) => {
        console.warn("Conexión cerrada. Código:", event.code, "Razón:", event.reason);
        console.log("AIS background WebSocket connection closed. Reconnecting in 5 seconds...");
        radarWsActive = false;
        iniciarFallbackRadar();
        if (getRadarAisApiKey()) {
            setTimeout(startAutomaticRadar, 5000);
        }
    };
} catch (e) {
    console.error("Error initializing background AIS WebSocket:", e);
    radarWsActive = false;
    iniciarFallbackRadar();
}
}

function getRadarAisApiKey() {
    let storedKey = '';
    try {
        storedKey = String(window.AISSTREAM_API_KEY || localStorage.getItem('aisstream_api_key') || '').trim();
    } catch (_) {
        storedKey = String(window.AISSTREAM_API_KEY || '').trim();
    }
    if (storedKey.includes('***') || storedKey.length < 10) {
        storedKey = '';
    }
    return storedKey;
}

function procesarMensajeDeRadar(message) {
    if (!message) return;
    const metadata = message.MetaData || {};
    const nestedMessage = message.Message || {};
    const positionReport = message.PositionReport || nestedMessage.PositionReport || {};
    const staticData = message.ShipStaticData || nestedMessage.ShipStaticData || {};

    if (message.MessageType === "PositionReport" || message.latitude !== undefined || metadata.latitude !== undefined || positionReport.Latitude !== undefined) {
        const mmsi = metadata.MMSI || metadata.mmsi || message.MMSI || message.mmsi || positionReport.UserID || staticData.UserID;
        if (!mmsi) return;

        // Resolve ShipType: could be string from API response or number from raw AIS
        let shipTypeRaw = metadata.ShipType || metadata.shipType || message.ShipType || message.shipType || staticData.Type || message.vesselClass || message.type;
        let shipType = typeof shipTypeRaw === 'number' ? shipTypeRaw : parseInt(shipTypeRaw);
        if (isNaN(shipType)) {
            // If it's already mapped to string "Cargo", "Bulk Carrier" etc, map it back to 70 for array checking
            const isCargoString = typeof shipTypeRaw === 'string' && 
                ["Cargo", "Bulk Carrier", "General Cargo", "General Cargo Vessel", "MPV"].includes(shipTypeRaw);
            if (isCargoString) {
                shipType = 70;
            }
        }

        // Filter for cargo vessels only
        if (CARGO_SHIP_TYPES.includes(shipType) || shipType === undefined || isNaN(shipType)) {
            let latVal = null;
            let lonVal = null;

            if (positionReport && positionReport.Latitude !== undefined) {
                latVal = positionReport.Latitude;
                lonVal = positionReport.Longitude;
            } else {
                latVal = parseFloat(metadata.latitude || metadata.AIS_Live_Lat || message.latitude || message.AIS_Live_Lat);
                lonVal = parseFloat(metadata.longitude || metadata.AIS_Live_Lon || message.longitude || message.AIS_Live_Lon);
            }

            if (isNaN(latVal) || isNaN(lonVal)) return;

            vesselStore[mmsi] = {
                ...(vesselStore[mmsi] || {}),
                mmsi: mmsi,
                name: metadata.ShipName || metadata.shipName || message.ShipName || message.vesselName || message.name || staticData.Name || (vesselStore[mmsi] && vesselStore[mmsi].name) || "Unknown",
                IMO: metadata.IMO || metadata.imo || message.IMO || message.imo || staticData.ImoNumber || (vesselStore[mmsi] && vesselStore[mmsi].IMO) || "N/A",
                lat: latVal,
                lon: lonVal,
                speed: message.speed || metadata.speed || positionReport.Sog || 0,
                NavigationalStatus: message.NavigationalStatus || metadata.NavigationalStatus || positionReport.NavigationalStatus,
                score: "94%"
            };
            updateRadarView();
        }
    }
}

function iniciarFallbackRadar() {
    detenerFallbackRadar();
    console.log("AIS_FALLBACK: Activando sistema de contingencia secundario...");
    ejecutarFallbackRadarPolling();
}

async function ejecutarFallbackRadarPolling() {
    if (radarFallbackProcessing) return;
    if (radarWsActive) {
        return;
    }
    if (window.simulacionRadarActiva) {
        console.log("⏳ Modo Sandbox activo. Saltando actualización automática para no borrar los buques de test.");
        return;
    }
    radarFallbackProcessing = true;
    console.log("Scanning ships...");

    try {
        const response = await fetch(AIS_PROXY_ENDPOINT);
        console.log("[Radar Fallback] get-vessels response:", {
            ok: response.ok,
            status: response.status,
            statusText: response.statusText,
            contentType: response.headers && typeof response.headers.get === 'function' ? response.headers.get('content-type') : ''
        });

        if (response.status === 429) {
            console.error("AIS_FALLBACK ERROR 429: Limite de peticiones excedido por el servidor. Activando apagon de seguridad de 5 minutos.");
            programarSiguienteIntentoFallback(AIS_FALLBACK_COOLDOWN_INTERVAL);
            return;
        }

        const responseText = await response.text();
        const payload = responseText ? JSON.parse(responseText) : [];
        if (!response.ok) {
            throw new Error(payload && payload.error ? payload.error : `HTTP ${response.status}`);
        }
        const vessels = Array.isArray(payload)
            ? payload
            : (Array.isArray(payload && payload.vessels) ? payload.vessels : []);
        if (!Array.isArray(payload) && !(payload && Array.isArray(payload.vessels))) {
            console.warn("[Radar Fallback] get-vessels no devolvió una lista de buques.", payload);
        }
        console.log(`[Radar Fallback] get-vessels parsed vessels: ${vessels.length}`);
        if (vessels.length === 0) {
            console.warn("[Radar Fallback] get-vessels parsed vessels: 0. Peticion vacia.");
            console.log(`AIS_FALLBACK: Modo espera activo. Siguiente intento en ${AIS_FALLBACK_RETRY_INTERVAL / 1000} segundos.`);
            programarSiguienteIntentoFallback(AIS_FALLBACK_RETRY_INTERVAL);
            return;
        }
        vessels
            .filter(message => message && (message.MetaData || message.MMSI || message.mmsi || message.ShipName || message.vesselName))
            .forEach(message => {
                procesarMensajeDeRadar(message);
            });
        if (vessels.length > 0) {
            console.log(`[Radar Fallback] Sincronizados ${vessels.length} buques exitosamente.`);
        }
        programarSiguienteIntentoFallback(AIS_FALLBACK_RETRY_INTERVAL);
    } catch (err) {
        console.error("AIS_FALLBACK: Fallo de red en la API de contingencia:", err);
        programarSiguienteIntentoFallback(AIS_FALLBACK_RETRY_INTERVAL);
    } finally {
        radarFallbackProcessing = false;
    }
}

function programarSiguienteIntentoFallback(milisegundos) {
    clearTimeout(radarFallbackTimer);
    radarFallbackTimer = null;
    if (radarWsActive) return;
    radarFallbackTimer = setTimeout(ejecutarFallbackRadarPolling, milisegundos);
}

function detenerFallbackRadar() {
    if (radarFallbackTimer) {
        clearTimeout(radarFallbackTimer);
        radarFallbackTimer = null;
        console.log("AIS_FALLBACK: Sistema de contingencia en bucle desactivado.");
    }
}

// --- 3. PROFESSIONAL RENDERING ---

function updateRadarView() {

const shipList = Object.values(vesselStore);

const container = document.getElementById('radar-list');

if (!container) return;


container.innerHTML = shipList.map(ship => {
const latVal = typeof ship.lat === 'number' ? ship.lat.toFixed(2) : ship.lat;
const lonVal = typeof ship.lon === 'number' ? ship.lon.toFixed(2) : ship.lon;
return ` 
<div class="bg-white rounded-lg shadow-sm border border-slate-200 p-4"> 
<div class="flex justify-between items-start"> 
<div> 
<h3 class="font-bold text-slate-800">${ship.name} <span class="text-xs text-slate-400">IMO: ${ship.IMO}</span></h3> 
</div> 
<span class="text-emerald-600 font-bold text-sm">SCORE: ${ship.score}</span> 
</div> 
<div class="grid grid-cols-4 gap-2 text-xs mt-2 text-slate-500"> 
<div><span class="block text-slate-400">LAT</span>${latVal}</div> 
<div><span class="block text-slate-400">LON</span>${lonVal}</div> 
<div><span class="block text-slate-400">MMSI</span>${ship.mmsi}</div> 
<div><span class="block text-slate-400">STATUS</span>ACTIVE</div> 
</div> 
</div>`;
}).join(''); 
} 
</script>
</body>
</html>
