[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # ESTO BLOQUEA LAS MIGRACIONES AUTOMÁTICAS
  SKIP_PRISMA_MIGRATE = "true"
  PRISMA_SKIP_POSTINSTALL_GENERATE = "true"
  NETLIFY_SKIP_BUILD_DATABASE = "true"
  NODE_ENV = "production"
  # Mantenemos la conexión real para que tu app funcione
  DATABASE_URL = "tu_valor_real_de_la_variable"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * wss: https:; img-src * data: blob:; style-src * 'unsafe-inline';"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/components.js"
  to = "/public/components.js"
  status = 200

[[redirects]]
  from = "/databridge.html"
  to = "/public/databridge.html"
  status = 200
