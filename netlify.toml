[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  # Añade esta línea si tu carpeta de migraciones está aquí:
  ignore = "netlify/database/migrations/*"

[build.environment]
  SKIP_PRISMA_MIGRATE = "true"
  PRISMA_SKIP_POSTINSTALL_GENERATE = "true"
  NODE_ENV = "production"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * wss: https:; img-src * data: blob:; style-src * 'unsafe-inline';"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/route"
  to = "/.netlify/functions/route"
  status = 200

[[redirects]]
  from = "/components.js"
  to = "/public/components.js"
  status = 200

[[redirects]]
  from = "/databridge.html"
  to = "/public/databridge.html"
  status = 200
