[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_SKIP_BUILD_DATABASE = "true"
  SKIP_PRISMA_MIGRATE = "true"
  PRISMA_SKIP_POSTINSTALL_GENERATE = "true"
  NODE_ENV = "production"

# Configuración de funciones corregida (Netlify v2 syntax)
[functions]
  # Usamos la configuración de empaquetado recomendada por Netlify
  # para evitar el error de objeto
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * wss: https:; img-src * data: blob:; style-src * 'unsafe-inline';"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
