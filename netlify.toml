[[redirects]]
  from = "/api/databridge/*"
  to = "https://calm-shortbread-55bcfc.netlify.app/api/:splat"
  status = 200
  force = true

[build]
  # Compile the application only; database lifecycle is managed externally.
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_ENV = "production"
  NETLIFY_DATABASE_MIGRATIONS_ENABLED = "false"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * wss: https:; img-src * data: blob:; style-src * 'unsafe-inline';"

[[redirects]]
  from = "/api/syncPull/*"
  to = "/.netlify/functions/sync-pull/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/route"
  to = "/.netlify/functions/route"
  status = 200

[[redirects]]
  from = "/components.js"
  to = "/public/components.js"
  status = 200

[[redirects]]
  from = "/databridge.html"
  to = "/public/databridge.html"
  status = 200

  
