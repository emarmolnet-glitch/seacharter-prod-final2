[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Desactivación total de base de datos y migraciones
  NETLIFY_SKIP_BUILD_DATABASE = "true"
  SKIP_PRISMA_MIGRATE = "true"
  PRISMA_SKIP_POSTINSTALL_GENERATE = "true"
  NODE_ENV = "production"

# Configuración de funciones simplificada sin errores de objeto
[functions]
  # Eliminamos node_bundle para dejar que Netlify gestione el empaquetado por defecto

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * wss: https:; img-src * data: blob:; style-src * 'unsafe-inline';"

[[redirects]]
  from = "/api/receive-vessels"
  to = "/.netlify/functions/receive-vessels"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/components.js"
  to = "/public/components.js"
  status = 200

[[redirects]]
  from = "/databridge.html"
  to = "/public/databridge.html"
  status = 200
